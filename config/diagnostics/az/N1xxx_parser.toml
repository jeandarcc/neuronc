[catalog]
locale = "az"
bucket = "N1xxx_parser"
display_name = "Parser diaqnostikası"
inherits_contract = "N1xxx_parser"

[contracts]
allowed_exact_codes = ["NR1001", "NR1002"]
allowed_n_range = "1000-1599"
allowed_w_range = "1000-1099"
future_addition_rule = "Bu faylda yalnız N1000-N1599, W1000-W1099 və yuxarıda sadalanan dəqiq köhnə parser kodları görünə bilər."

[messages.nr1001]
severity = "error"
phase = "lexer"
slug = "legacy_lexer_error"
title = "Lexer xətası (köhnə)"
summary = "Daha dəqiq lexer kodları qoşulana qədər tokenizasiya uğursuzluqları üçün uyğunluq bölməsi."
default_message = "Mənbədə yanlış token, səhv formalaşdırılmış literal və ya qeyri-qanuni simvol ardıcıllığı var."
recovery = "Bildirilən mövqe yaxınlığındakı ilk yanlış simvolu və ya səhv formalaşdırılmış literalı yoxlayın."
tags = ["legacy", "lexer", "fallback"]

[messages.nr1002]
severity = "error"
phase = "parser"
slug = "legacy_parser_error"
title = "Parser xətası (köhnə)"
summary = "Daha dəqiq parser kodları qoşulana qədər parsing uğursuzluqları üçün uyğunluq bölməsi."
default_message = "Mənbə gözlənilən Neuron qrammatikasına uyğun gəlmir."
recovery = "Bildirilən token sərhədini, delimitator cütlüyünü və gözlənilən bəyanat və ya ifadə formasını yoxlayın."
tags = ["legacy", "parser", "fallback"]

[messages.N1001]
severity = "error"
phase = "lexer"
slug = "invalid_character"
title = "Yanlış simvol"
summary = "Lexer mövcud mənbə kontekstində yanlış olan simvolla qarşılaşdı."
default_message = "Mənbədə yanlış simvol tapıldı."
recovery = "Simvolu silin və ya onu hündür Neuron sintaksisi ilə əvəz edin."
tags = ["lexer", "character", "syntax"]

[messages.N1002]
severity = "error"
phase = "lexer"
slug = "unterminated_string_literal"
title = "Sonlandırılmamış sətir literalı"
summary = "Sətir literalı başlayıb, lakin sətir və ya fayl bitməmiş bağlanmayıb."
default_message = "Sətir literalının bağlayıcı dırnaq işarəsi çatışmır."
recovery = "Çatışmayan dırnaq işarəsini əlavə edin və ya daxili dırnaq işarələrini düzgün şəkildə escape edin."
tags = ["lexer", "string", "literal"]

[messages.N1101]
severity = "error"
phase = "parser"
slug = "missing_expression_operand"
title = "İfadə operandı çatışmır"
summary = "Operator və ya ifadə forması tələb olunan sol və ya sağ operand olmadan görünür."
default_message = "İfadənin operandı çatışmır."
recovery = "Çatışmayan operandı əlavə edin və ya natamam operatoru silin."
tags = ["parser", "expression", "operand"]

[messages.N1102]
severity = "error"
phase = "parser"
slug = "unexpected_token_in_expression"
title = "İfadə daxilində gözlənilməz token"
summary = "Parser mövcud ifadəni davam etdirə bilməyən token tapdı."
default_message = "İfadə parse edilərkən gözlənilməz token."
recovery = "Bildirilən token yaxınlığındakı mötərizə qruplaşmalarını, ayırıcıları və postfiks sintaksisini yoxlayın."
tags = ["parser", "expression", "token"]

[messages.N1201]
severity = "error"
phase = "parser"
slug = "missing_statement_terminator"
title = "Bəyanat sonlandırıcısı çatışmır"
summary = "Bəyanat sərhədi gözlənilirdi, lakin tapılmadı."
default_message = "Bəyanatın gözlənilən sonlandırıcısı çatışmır."
recovery = "Çatışmayan nöqtəli vergülü əlavə edin və ya bəyanatı etibarlı blok formasına yenidən yazın."
tags = ["parser", "statement", "terminator"]

[messages.N1301]
severity = "error"
phase = "parser"
slug = "invalid_parameter_declaration"
title = "Yanlış parametr elanı"
summary = "Metod parametri dilin elan edilmiş parametr sintaksisinə uyğun gəlmir."
default_message = "Parametr elanı səhv formalaşdırılıb."
recovery = "Kanonik `name as Type` formasından istifadə edin və parametrləri vergüllə ayırın."
tags = ["parser", "function", "parameter"]

[messages.N1401]
severity = "error"
phase = "parser"
slug = "malformed_type_annotation"
title = "Səhv formalaşdırılmış tip annotasiyası"
summary = "Tip annotasiyası və ya generik arqument siyahısı sintaktik olaraq natamamdır və ya səhv formalaşdırılıb."
default_message = "Tip annotasiyası səhv formalaşdırılıb."
recovery = "Generik mötərizələri, vergülləri, qoşa nöqtələri və boşatılan (nullable) və ya göstərici (pointer) tiplərinin yazılışını yoxlayın."
tags = ["parser", "type", "generic"]

[messages.N1501]
severity = "error"
phase = "parser"
slug = "unexpected_end_of_file"
title = "Gözlənilməz fayl sonu"
summary = "Parser mövcud strukturu bitirməmiş mənbə faylı sona çatdı."
default_message = "Mövcud struktur bağlanmamış mənbə faylı sona çatdı."
recovery = "Çatışmayan bağlayıcı delimitatoru əlavə edin və ya tamamlanmamış elanı və ya bloku supple edin."
tags = ["parser", "recovery", "eof"]

[messages.W1001]
severity = "warning"
phase = "parser"
slug = "recovered_missing_token"
title = "Parser gözlənilən tokeni daxil edərək bərpa olundu"
summary = "Parser çatışmayan token fərz etdikdən sonra davam etdi."
default_message = "Parser çatışmayan tokeni nəticə çıxardıqdan sonra bərpa olundu."
recovery = "Ətraf sintaksisi düzəldin ki, bərpa artıq tələb olunmasın."
tags = ["warning", "parser", "recovery"]

[messages.W1002]
severity = "warning"
phase = "parser"
slug = "deprecated_syntax_accepted"
title = "Köhnəlmiş sintaksis qəbul edildi"
summary = "Parser miqrasiya edilməli olan köhnə sintaksis formasını qəbul etdi."
default_message = "Uyğunluq üçün köhnəlmiş sintaksis qəbul edildi."
recovery = "Mövcud kanonik sintaksisdən istifadə edərək strukturu yenidən yazın."
tags = ["warning", "parser", "compatibility"]


[messages.N1103]
severity = "error"
phase = "parser"
slug = "unexpected_token"
title = "Gozlenilmez token"
summary = "Parser cari movqede etibarli olmayan bir token ile qarsilasdi."
default_message = "Gozlenilmez token: '{token}'."
parameters = ["token"]
recovery = "Tokeni silin veya etrafdaki sintaksisi bu movqede etibarli olacaq sekilde yeniden yazin."
tags = ["parser", "token", "recovery"]
