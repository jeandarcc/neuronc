[catalog]
locale = "la"
bucket = "N1xxx_parser"
display_name = "Diagnostica parseris"
inherits_contract = "N1xxx_parser"

[contracts]
allowed_exact_codes = ["NR1001", "NR1002"]
allowed_n_range = "1000-1599"
allowed_w_range = "1000-1099"
future_addition_rule = "Solum N1000-N1599, W1000-W1099, et codices parseris priscae exacti supra recensiti in hoc archivo apparere possunt."

[messages.nr1001]
severity = "error"
phase = "lexer"
slug = "legacy_lexer_error"
title = "Error lexeris (prisca)"
summary = "Receptaculum compatibilitatis pro defectibus tokenizationis donec codices lexeris subtiliores connectantur."
default_message = "Fons tessera (token) invalida, litteralis male formata, aut sequentia characterum illicita continet."
recovery = "Inspice primum characterem invalidum aut litteralem male formatam prope locum nuntiatum."
tags = ["legacy", "lexer", "fallback"]

[messages.nr1002]
severity = "error"
phase = "parser"
slug = "legacy_parser_error"
title = "Error parseris (prisca)"
summary = "Receptaculum compatibilitatis pro defectibus parsingis donec codices parseris subtiliores connectantur."
default_message = "Fons grammaticis Neuron expectatis non respondet."
recovery = "Inspice limitem tesserae nuntiatum, paria deliminatorum, et formam declarationis aut sententiae expectatam."
tags = ["legacy", "parser", "fallback"]

[messages.N1001]
severity = "error"
phase = "lexer"
slug = "invalid_character"
title = "Character invalidus"
summary = "Lexer characterem invenit qui in textu fontis praesenti non est validus."
default_message = "Character invalidus in fonte inventus est."
recovery = "Remove characterem aut eum syntaxi Neuron valida substitue."
tags = ["lexer", "character", "syntax"]

[messages.N1002]
severity = "error"
phase = "lexer"
slug = "unterminated_string_literal"
title = "Litteralis nervi (string) non terminata"
summary = "Litteralis nervi incepit sed ante finem lineae aut archivi non clausa est."
default_message = "Litteralis nervi signo clausurae caret."
recovery = "Adde signum clausurae aut signa inserta recte evita (escape)."
tags = ["lexer", "string", "literal"]

[messages.N1101]
severity = "error"
phase = "parser"
slug = "missing_expression_operand"
title = "Operandum expressionis deest"
summary = "Operator aut forma expressionis apparet sine operando sinistro aut dextro requisito."
default_message = "Expressio operando caret."
recovery = "Adde operandum quod deest aut operatorem incompletum remove."
tags = ["parser", "expression", "operand"]

[messages.N1102]
severity = "error"
phase = "parser"
slug = "unexpected_token_in_expression"
title = "Tessera inexpectata in expressione"
summary = "Parser tesseram invenit quae expressionem praesentem continuare non potest."
default_message = "Tessera inexpectata dum expressio parsebatur."
recovery = "Recognosce coetum uncum, separatores, et syntaxin post-fixam prope tesseram nuntiatam."
tags = ["parser", "expression", "token"]

[messages.N1201]
severity = "error"
phase = "parser"
slug = "missing_statement_terminator"
title = "Terminator sententiae deest"
summary = "Limes sententiae expectabatur sed non est inventus."
default_message = "Sententia terminatore expectato caret."
recovery = "Adde punctum virgulam quod deest aut sententiam in formam clusi validam rescribe."
tags = ["parser", "statement", "terminator"]

[messages.N1301]
severity = "error"
phase = "parser"
slug = "invalid_parameter_declaration"
title = "Declaratio parametri invalida"
summary = "Parametrum methodi syntaxi parametrorum linguae declaratae non respondet."
default_message = "Declaratio parametri male formata est."
recovery = "Utere forma canonica `nomen as Type` et parametra commatibus separa."
tags = ["parser", "function", "parameter"]

[messages.N1401]
severity = "error"
phase = "parser"
slug = "malformed_type_annotation"
title = "Annotatio typi male formata"
summary = "Annotatio typi aut index argumentorum genericorum syntactice incompleta aut male formata est."
default_message = "Annotatio typi male formata est."
recovery = "Recognosce uncos genericos, commata, cola, et orthographiam typorum nullabilium aut indicum (pointers)."
tags = ["parser", "type", "generic"]

[messages.N1501]
severity = "error"
phase = "parser"
slug = "unexpected_end_of_file"
title = "Inexpectatus finis archivi"
summary = "Fons finiit antequam parser structuram praesentem perficere potuit."
default_message = "Fons finiit antequam structura praesens clauderetur."
recovery = "Adde delimitatorem clausurae qui deest aut declarationem vel clusum imperfectum supple."
tags = ["parser", "recovery", "eof"]

[messages.W1001]
severity = "warning"
phase = "parser"
slug = "recovered_missing_token"
title = "Parser tesseram expectatam inserendo recreatus"
summary = "Parser post tesseram deesse putatam processit."
default_message = "Parser recreatus est postquam tesseram deesse coniecit."
recovery = "Corrige syntaxin circumstantem ut recreatio non iam opus sit."
tags = ["warning", "parser", "recovery"]

[messages.W1002]
severity = "warning"
phase = "parser"
slug = "deprecated_syntax_accepted"
title = "Syntaxis obsoleta accepta"
summary = "Parser formam syntaxis priscae accepit quae migrare debet."
default_message = "Syntaxis obsoleta pro compatibilitate accepta est."
recovery = "Structuram syntaxi canonica praesenti rescribe."
tags = ["warning", "parser", "compatibility"]


[messages.N1103]
severity = "error"
phase = "parser"
slug = "unexpected_token"
title = "Signum inopinatum"
summary = "Parser signum invenit quod in hoc loco validum non est."
default_message = "Signum inopinatum: '{token}'."
parameters = ["token"]
recovery = "Signum remove aut syntaxin circumstantem ita rescribe ut hoc loco valida sit."
tags = ["parser", "token", "recovery"]
