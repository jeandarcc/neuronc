[catalog]
locale = "la"
bucket = "shared_compat"
display_name = "Diagnostica de compatibilitate communis"
inherits_contract = "shared_compat"

[contracts]
allowed_exact_codes = ["NR0001", "NR3001", "NR9000", "NR9001", "NR9002"]
future_addition_rule = "Solum codices compatibilitatis exacti supra recensiti in hoc archivo apparere possunt."

[messages.nr0001]
severity = "error"
phase = "generic"
slug = "legacy_generic_error"
title = "Error compilatoris generalis (prisca)"
summary = "Receptaculum subsidii pro erroribus compilatoris qui nondum cuidam familiae diagnosticae certae attributi sunt."
default_message = "Compilator defecit, sed nulla familia diagnostica certa huic errori adhuc attributa est."
recovery = "Primum locum fontis nuntiatum inspice, deinde diagnosticum ad familiam certam move cum implementatio exactior fiet."
tags = ["legacy", "fallback", "generic"]

[messages.nr3001]
severity = "error"
phase = "config"
slug = "legacy_project_configuration_error"
title = "Error configurationis proiecti (prisca)"
summary = "Receptaculum compatibilitatis pro defectibus configurationis qui compilationem fontis aut executionem impediunt."
default_message = "Configuratio proiecti invalida aut incompleta est pro operatione fontis petita."
recovery = "Recognosce neuron.toml, occasus moduli, et quemvis apparatum aedificationis vel executionis requisitum prope locum nuntiatum."
tags = ["legacy", "config", "fallback"]

[messages.nr9000]
severity = "warning"
phase = "generic"
slug = "legacy_generic_warning"
title = "Monitio compilatoris generalis (prisca)"
summary = "Receptaculum subsidii pro monitionibus quae nondum cuidam familiae monitionum angustiori attributae sunt."
default_message = "Compilator programma accepit, sed monitionem deprehendit quae adhuc per codicem compatibilitatis generalem mittitur."
recovery = "Lege textum monitionis et eam ad familiam monitionum certam migra cum implementatio eam patefaciet."
tags = ["legacy", "warning", "fallback"]

[messages.nr9001]
severity = "warning"
phase = "config"
slug = "legacy_project_configuration_warning"
title = "Monitio configurationis proiecti (prisca)"
summary = "Receptaculum compatibilitatis pro monitionibus configurationis proiecti non letalibus."
default_message = "Configuratio proiecti cum monitione accepta est."
recovery = "Recognosce occasum monitum et configurationem astringe si mores determinati requiruntur."
tags = ["legacy", "warning", "config"]

[messages.nr9002]
severity = "warning"
phase = "semantic"
slug = "unused_binding_warning"
title = "Ligatio non adhibita"
summary = "Ligatio localis declarata est sed nunquam adhibita."
default_message = "Ligatio declarata nunquam legitur."
recovery = "Remove ligationem, ea utere, aut de industria cur eam inusitatam manere oporteat enumera."
tags = ["warning", "semantic", "unused", "lsp"]

