[catalog]
locale = "es"
bucket = "N5xxx_codegen"
display_name = "Diagnósticos de generación de código"
inherits_contract = "N5xxx_codegen"

[contracts]
allowed_exact_codes = []
allowed_n_range = "5000-5099"
allowed_w_range = "5000-5099"
future_addition_rule = "Solo N5000-N5099 y W5000-W5099 pueden aparecer en este archivo."

[messages.N5001]
severity = "error"
phase = "codegen"
slug = "unsupported_lowering"
title = "Bajada (lowering) no soportada"
summary = "El programa de origen es semánticamente válido, pero el backend actual no puede bajar una de sus construcciones."
default_message = "Esta construcción de fuente no puede ser bajada por el backend seleccionado."
recovery = "Reescriba la construcción, cambie el backend o implemente el soporte de bajada para la característica faltante."
tags = ["codegen", "lowering", "backend"]

[messages.N5002]
severity = "error"
phase = "runtime"
slug = "runtime_trap"
title = "Trampa de tiempo de ejecución"
summary = "La ejecución alcanzó un fallo de tiempo de ejecución que debería presentarse como un diagnóstico estructurado en lugar de un cierre silencioso."
default_message = "El programa quedó atrapado en tiempo de ejecución."
recovery = "Inspeccione la operación fallida y agregue protecciones a nivel de fuente o corrija el error de bajada."
tags = ["runtime", "trap", "execution"]

[messages.N5003]
severity = "error"
phase = "codegen"
slug = "target_backend_not_available"
title = "Backend de destino no disponible"
summary = "La característica de fuente solicitada requiere un backend que no está disponible en la cadena de herramientas o entorno actual."
default_message = "El backend requerido no está disponible."
recovery = "Habilite el backend, instale sus dependencias o elija una ruta de ejecución soportada."
tags = ["codegen", "backend", "environment"]

[messages.N5004]
severity = "error"
phase = "codegen"
slug = "abi_layout_mismatch"
title = "Discrepancia de ABI o diseño (layout)"
summary = "El código generado y las expectativas de tiempo de ejecución no coinciden en el diseño o contrato de llamada de un valor."
default_message = "El ABI generado o el diseño de datos no coincide con las expectativas de tiempo de ejecución."
recovery = "Alinee el contrato de origen, el contrato de tiempo de ejecución y la bajada del backend para el tipo afectado."
tags = ["codegen", "abi", "layout"]

[messages.N5005]
severity = "error"
phase = "link"
slug = "external_symbol_not_resolved"
title = "Símbolo externo no resuelto"
summary = "La generación de código tuvo éxito, pero un símbolo externo requerido no pudo ser resuelto para la ejecución."
default_message = "El símbolo externo requerido no pudo ser resuelto."
recovery = "Vincule la biblioteca faltante, exporte el símbolo faltante o elimine la dependencia no resuelta."
tags = ["codegen", "link", "extern"]

[messages.N5006]
severity = "error"
phase = "runtime"
slug = "runtime_feature_contract_violated"
title = "Contrato de característica de tiempo de ejecución violado"
summary = "El programa compilado alcanzó un límite de capacidad de tiempo de ejecución que viola el contrato de ejecución a nivel de fuente."
default_message = "El entorno de tiempo de ejecución no satisface el contrato de características requerido por este programa."
recovery = "Ajuste el entorno de tiempo de ejecución o proteja la característica tras una ruta de ejecución soportada."
tags = ["runtime", "feature", "environment"]

[messages.W5001]
severity = "warning"
phase = "codegen"
slug = "backend_fallback_path_selected"
title = "Ruta de respaldo del backend seleccionada"
summary = "La ejecución sigue siendo correcta, pero la ruta de backend preferida no estaba disponible y se seleccionó una ruta de respaldo."
default_message = "La ruta de backend preferida no estaba disponible; usando una ruta de respaldo."
recovery = "Habilite el backend preferido si requiere el rendimiento o perfil de características esperado."
tags = ["warning", "codegen", "backend", "fallback"]

[messages.W5002]
severity = "warning"
phase = "codegen"
slug = "optimization_disabled_for_correctness"
title = "Optimización deshabilitada por corrección"
summary = "Se omitió intencionalmente una optimización potencialmente válida para preservar la corrección del programa."
default_message = "La optimización fue deshabilitada para preservar la corrección."
recovery = "No se requiere ninguna acción a menos que esté investigando el rendimiento; en ese caso, inspeccione la construcción que bloquea la optimización."
tags = ["warning", "codegen", "optimization"]

