[catalog]
locale = "ru"
bucket = "N3xxx_ownership"
display_name = "Диагностики владения"
inherits_contract = "N3xxx_ownership"

[contracts]
allowed_exact_codes = []
allowed_n_range = "3000-3299"
allowed_w_range = "3000-3099"
future_addition_rule = "В этом файле могут появляться только коды N3000-N3299 и W3000-W3099."

[messages.N3001]
severity = "error"
phase = "ownership"
slug = "use_after_move"
title = "Использование после перемещения"
summary = "Значение было использовано после того, как права владения уже были переданы."
default_message = "Значение используется после того, как права владения им были перемещены."
recovery = "Используйте нового владельца, создайте явную копию или повторно инициализируйте исходную привязку перед повторным использованием."
tags = ["ownership", "move", "lifetime"]

[messages.N3002]
severity = "error"
phase = "ownership"
slug = "double_move"
title = "Двойное перемещение"
summary = "Один и тот же владелец перемещается более одного раза без повторной инициализации."
default_message = "Права владения не могут быть переданы более одного раза из одного и того же состояния значения."
recovery = "Переместите значение один раз или заново привяжите его перед любым дополнительным перемещением."
tags = ["ownership", "move", "duplicate"]

[messages.N3003]
severity = "error"
phase = "ownership"
slug = "invalid_move_source"
title = "Недопустимый источник перемещения"
summary = "Попытка перемещения из источника, который не поддерживает передачу прав в текущей форме."
default_message = "Права владения не могут быть перемещены из этого источника."
recovery = "Перемещайте из именованного владельца или перепишите выражение в форму, поддерживающую перемещение."
tags = ["ownership", "move", "source"]

[messages.N3101]
severity = "error"
phase = "ownership"
slug = "mutable_access_during_active_borrow"
title = "Изменение при наличии активного заимствования"
summary = "Значение изменяется в то время, как конфликтующее заимствование или псевдоним все еще активны."
default_message = "Значение не может быть изменено, пока активно конфликтующее заимствование."
recovery = "Сначала завершите заимствование или перестройте код, чтобы избежать перекрывающегося доступа."
tags = ["ownership", "borrow", "mutation"]

[messages.N3102]
severity = "error"
phase = "ownership"
slug = "illegal_alias_use_after_transfer"
title = "Недопустимое использование псевдонима после передачи прав владения"
summary = "Псевдоним или заимствованное представление переживает состояние владения, от которого оно зависит."
default_message = "Псевдоним нельзя использовать после изменения первоначального владельца."
recovery = "Создайте независимую копию или убедитесь, что псевдоним использован до передачи прав владения."
tags = ["ownership", "alias", "move"]

[messages.N3201]
severity = "error"
phase = "ownership"
slug = "dangling_reference_return"
title = "Возврат «висячей» ссылки"
summary = "Функция пытается вернуть ссылку, псевдоним или указатель на область памяти, которая станет недействительной при возврате."
default_message = "Возвращаемая ссылка переживет значение, на которое она указывает."
recovery = "Вместо этого верните принадлежащее (owned) значение или верните ссылку на область памяти, которая остается действительной."
tags = ["ownership", "lifetime", "return"]

[messages.N3202]
severity = "error"
phase = "ownership"
slug = "escaping_borrow"
title = "Утечка заимствования"
summary = "Заимствованное представление выходит за пределы области видимости, в которой владеемая память остается действительной."
default_message = "Заимствованное значение выходит за пределы своего жизненного цикла."
recovery = "Держите заимствование локальным в пределах допустимой области видимости или верните собственную копию."
tags = ["ownership", "borrow", "escape"]

[messages.N3203]
severity = "error"
phase = "ownership"
slug = "use_after_scope_end"
title = "Использование после выхода из области видимости"
summary = "Ссылочное значение используется после того, как память, от которой оно зависит, вышла из области видимости."
default_message = "Значение используется после истечения срока жизни исходной памяти."
recovery = "Сократите жизненный цикл ссылки или продлите жизненный цикл владеемой памяти."
tags = ["ownership", "lifetime", "scope"]

[messages.W3001]
severity = "warning"
phase = "ownership"
slug = "needless_move"
title = "Ненужное перемещение"
summary = "Операция перемещения указана явно, но она не повышает корректность или производительность в текущем контексте."
default_message = "Перемещение здесь не требуется."
recovery = "Удалите перемещение, если только оно не документирует намерение, которое важно сохранить для проекта."
tags = ["warning", "ownership", "move"]

[messages.W3002]
severity = "warning"
phase = "ownership"
slug = "suspicious_alias_chain"
title = "Подозрительная цепочка псевдонимов"
summary = "Длинная цепочка псевдонимов может быть допустимой, но она затрудняет анализ владения и изменений."
default_message = "Цепочка псевдонимов допустима, но трудна для анализа."
recovery = "Отдавайте предпочтение более коротким жизненным циклам псевдонимов или явному копированию там, где важна читаемость."
tags = ["warning", "ownership", "alias"]

