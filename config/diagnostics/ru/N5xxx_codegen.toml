[catalog]
locale = "ru"
bucket = "N5xxx_codegen"
display_name = "Диагностики генерации кода"
inherits_contract = "N5xxx_codegen"

[contracts]
allowed_exact_codes = []
allowed_n_range = "5000-5099"
allowed_w_range = "5000-5099"
future_addition_rule = "В этом файле могут появляться только коды N5000-N5099 и W5000-W5099."

[messages.N5001]
severity = "error"
phase = "codegen"
slug = "unsupported_lowering"
title = "Неподдерживаемое преобразование (lowering)"
summary = "Исходная программа семантически корректна, но текущий бэкенд не может преобразовать одну из её конструкций."
default_message = "Эта конструкция исходного кода не может быть преобразована выбранным бэкендом."
recovery = "Перепишите конструкцию, смените бэкенд или добавьте поддержку преобразования для недостающей функции."
tags = ["codegen", "lowering", "backend"]

[messages.N5002]
severity = "error"
phase = "runtime"
slug = "runtime_trap"
title = "Ловушка времени выполнения (trap)"
summary = "Выполнение достигло сбоя, который должен быть представлен как структурированная диагностика, а не как тихое завершение работы."
default_message = "Программа попала в ловушку во время выполнения."
recovery = "Проверьте операцию, вызвавшую сбой, и добавьте проверки на уровне исходного кода или исправьте ошибку преобразования."
tags = ["runtime", "trap", "execution"]

[messages.N5003]
severity = "error"
phase = "codegen"
slug = "target_backend_not_available"
title = "Целевой бэкенд недоступен"
summary = "Запрошенная функция требует бэкенд, который недоступен в текущем инструментарии или среде."
default_message = "Требуемый бэкенд недоступен."
recovery = "Включите бэкенд, установите его зависимости или выберите поддерживаемый путь выполнения."
tags = ["codegen", "backend", "environment"]

[messages.N5004]
severity = "error"
phase = "codegen"
slug = "abi_layout_mismatch"
title = "Несоответствие ABI или компоновки"
summary = "Сгенерированный код и ожидания среды выполнения не совпадают в вопросах компоновки данных или контракта вызова значения."
default_message = "Сгенерированный ABI или компоновка данных не соответствуют ожиданиям среды выполнения."
recovery = "Согласуйте контракт исходного кода, контракт среды выполнения и преобразование бэкенда для затронутого типа."
tags = ["codegen", "abi", "layout"]

[messages.N5005]
severity = "error"
phase = "link"
slug = "external_symbol_not_resolved"
title = "Внешний символ не разрешен"
summary = "Генерация кода прошла успешно, но необходимый внешний символ не удалось разрешить для выполнения."
default_message = "Не удалось разрешить требуемый внешний символ."
recovery = "Подключите недостающую библиотеку, экспортируйте недостающий символ или удалите неразрешенную зависимость."
tags = ["codegen", "link", "extern"]

[messages.N5006]
severity = "error"
phase = "runtime"
slug = "runtime_feature_contract_violated"
title = "Нарушение контракта функций среды выполнения"
summary = "Скомпилированная программа достигла предела возможностей среды выполнения, что нарушает контракт выполнения на уровне исходного кода."
default_message = "Среда выполнения не удовлетворяет контракту функций, требуемому этой программой."
recovery = "Настройте среду выполнения или вынесите функцию за пределы поддерживаемого пути выполнения."
tags = ["runtime", "feature", "environment"]

[messages.W5001]
severity = "warning"
phase = "codegen"
slug = "backend_fallback_path_selected"
title = "Выбран резервный путь бэкенда"
summary = "Выполнение остается корректным, но предпочтительный путь бэкенда был недоступен, поэтому был выбран резервный путь."
default_message = "Предпочтительный путь бэкенда недоступен; используется резервный путь."
recovery = "Включите предпочтительный бэкенд, если вам требуется ожидаемая производительность или набор функций."
tags = ["warning", "codegen", "backend", "fallback"]

[messages.W5002]
severity = "warning"
phase = "codegen"
slug = "optimization_disabled_for_correctness"
title = "Оптимизация отключена для обеспечения корректности"
summary = "Потенциально допустимая оптимизация была намеренно пропущена для сохранения корректности программы."
default_message = "Оптимизация отключена для обеспечения корректности."
recovery = "Никаких действий не требуется, если только вы не исследуете производительность; в этом случае проверьте конструкцию, блокирующую оптимизацию."
tags = ["warning", "codegen", "optimization"]

