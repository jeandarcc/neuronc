[catalog]
locale = "ru"
bucket = "shared_compat"
display_name = "Общие диагностики совместимости"
inherits_contract = "shared_compat"

[contracts]
allowed_exact_codes = ["NR0001", "NR3001", "NR9000", "NR9001", "NR9002"]
future_addition_rule = "В этом файле могут появляться только перечисленные выше точные коды совместимости."

[messages.nr0001]
severity = "error"
phase = "generic"
slug = "legacy_generic_error"
title = "Общая ошибка компилятора (устаревшая)"
summary = "Резервное хранилище для ошибок компилятора, которым еще не назначено конкретное диагностическое семейство."
default_message = "Произошел сбой компилятора, но конкретная диагностическая категория для этой ошибки еще не назначена."
recovery = "Сначала проверьте указанное место в исходном коде, а затем переместите диагностику в конкретную категорию по мере уточнения реализации."
tags = ["legacy", "fallback", "generic"]

[messages.nr3001]
severity = "error"
phase = "config"
slug = "legacy_project_configuration_error"
title = "Ошибка конфигурации проекта (устаревшая)"
summary = "Хранилище совместимости для сбоев конфигурации, препятствующих компиляции или выполнению исходного кода."
default_message = "Конфигурация проекта недействительна или неполна для запрошенной операции."
recovery = "Проверьте файлы neuron.toml, настройки модулей и необходимые параметры сборки или среды выполнения рядом с указанным местом."
tags = ["legacy", "config", "fallback"]

[messages.nr9000]
severity = "warning"
phase = "generic"
slug = "legacy_generic_warning"
title = "Общее предупреждение компилятора (устаревшее)"
summary = "Резервное хранилище для предупреждений, которым еще не назначена более узкая категория."
default_message = "Компилятор принял программу, но обнаружил предупреждение, которое все еще обрабатывается через общий код совместимости."
recovery = "Прочтите текст предупреждения и перенесите его в конкретную категорию, как только реализация предоставит такую возможность."
tags = ["legacy", "warning", "fallback"]

[messages.nr9001]
severity = "warning"
phase = "config"
slug = "legacy_project_configuration_warning"
title = "Предупреждение конфигурации проекта (устаревшее)"
summary = "Хранилище совместимости для некритических предупреждений конфигурации проекта."
default_message = "Конфигурация проекта принята с предупреждением."
recovery = "Проверьте настройки, вызвавшие предупреждение, и уточните конфигурацию, если требуется строгое поведение."
tags = ["legacy", "warning", "config"]

[messages.nr9002]
severity = "warning"
phase = "semantic"
slug = "unused_binding_warning"
title = "Неиспользуемая привязка"
summary = "Локальная привязка была объявлена, но ни разу не использовалась."
default_message = "Объявленная привязка ни разу не была прочитана."
recovery = "Удалите привязку, используйте её или намеренно задокументируйте, почему она должна оставаться неиспользуемой."
tags = ["warning", "semantic", "unused", "lsp"]

