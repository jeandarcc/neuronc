[catalog]
locale = "ko"
bucket = "shared_compat"
display_name = "공통 호환성 진단"
inherits_contract = "shared_compat"

[contracts]
allowed_exact_codes = ["NPP0001", "NPP3001", "NPP9000", "NPP9001", "NPP9002"]
future_addition_rule = "이 파일에는 위에서 나열된 정확한 호환성 코드만 나타날 수 있습니다."

[messages.NPP0001]
severity = "error"
phase = "generic"
slug = "legacy_generic_error"
title = "일반 컴파일러 오류 (기존)"
summary = "아직 특정 진단 하위 그룹에 할당되지 않은 컴파일러 오류를 위한 폴백 버킷입니다."
default_message = "컴파일러가 실패했지만, 이 오류에 대해 아직 특정 진단 그룹이 할당되지 않았습니다."
recovery = "먼저 보고된 소스 위치를 검사하고, 구현이 구체화됨에 따라 진단을 특정 그룹으로 이동하십시오."
tags = ["legacy", "fallback", "generic"]

[messages.NPP3001]
severity = "error"
phase = "config"
slug = "legacy_project_configuration_error"
title = "프로젝트 설정 오류 (기존)"
summary = "소스 컴파일 또는 실행을 방해하는 설정 실패에 대한 호환성 버킷입니다."
default_message = "요청된 소스 작업에 대해 프로젝트 설정이 유효하지 않거나 불완전합니다."
recovery = "neuron.toml, 모듈 설정 및 보고된 위치 근처의 필수 빌드 또는 런타임 설정을 검토하십시오."
tags = ["legacy", "config", "fallback"]

[messages.NPP9000]
severity = "warning"
phase = "generic"
slug = "legacy_generic_warning"
title = "일반 컴파일러 경고 (기존)"
summary = "아직 더 좁은 경고 그룹에 할당되지 않은 경고를 위한 폴백 버킷입니다."
default_message = "컴파일러가 프로그램을 수락했지만, 여전히 일반 호환성 코드를 통해 전달되는 경고를 감지했습니다."
recovery = "경고 텍스트를 읽고 구현이 특정 그룹을 제공하면 해당 그룹으로 마이그레이션하십시오."
tags = ["legacy", "warning", "fallback"]

[messages.NPP9001]
severity = "warning"
phase = "config"
slug = "legacy_project_configuration_warning"
title = "프로젝트 설정 경고 (기존)"
summary = "치명적이지 않은 프로젝트 설정 경고를 위한 호환성 버킷입니다."
default_message = "프로젝트 설정이 경고와 함께 수락되었습니다."
recovery = "경고된 설정을 검토하고 결정론적 동작이 필요한 경우 설정을 구체화하십시오."
tags = ["legacy", "warning", "config"]

[messages.NPP9002]
severity = "warning"
phase = "semantic"
slug = "unused_binding_warning"
title = "사용되지 않는 바인딩"
summary = "로컬 바인딩이 선언되었지만 한 번도 사용되지 않았습니다."
default_message = "선언된 바인딩이 한 번도 읽히지 않았습니다."
recovery = "바인딩을 제거하거나 사용하십시오. 또는 의도적으로 사용되지 않아야 하는 이유를 문서화하십시오."
tags = ["warning", "semantic", "unused", "lsp"]

