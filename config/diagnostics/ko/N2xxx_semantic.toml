[catalog]
locale = "ko"
bucket = "N2xxx_semantic"
display_name = "의미론적 진단"
inherits_contract = "N2xxx_semantic"

[contracts]
allowed_exact_codes = ["NR2001"]
allowed_n_range = "2000-2499"
allowed_w_range = "2000-2099"
future_addition_rule = "이 파일에는 N2000-N2499, W2000-W2099 및 위에서 나열된 정확한 기존 의미론적 코드만 나타날 수 있습니다."

[messages.nr2001]
severity = "error"
phase = "semantic"
slug = "legacy_semantic_error"
title = "의미론적 오류 (기존)"
summary = "더 정확한 의미론적 코드가 연결될 때까지 의미론적 실패를 위한 호환성 버킷입니다."
default_message = "프로그램이 구문적으로는 유효하지만 의미론적으로는 유효하지 않습니다."
recovery = "보고된 위치 근처의 타입, 이름, 제네릭, 오버로드 및 값 흐름을 검사하십시오."
tags = ["legacy", "semantic", "fallback"]

[messages.N2001]
severity = "error"
phase = "semantic"
slug = "type_mismatch"
title = "타입 불일치"
summary = "다른 타입이 필요한 위치에 한 타입의 값이 사용되었습니다."
default_message = "필요한 타입과 제공된 값의 타입이 일치하지 않습니다."
recovery = "소스 표현식을 변경하거나, 명시적 캐스트를 추가하거나, 대상 타입을 조정하십시오."
tags = ["semantic", "types", "assignment"]

[messages.N2002]
severity = "error"
phase = "semantic"
slug = "invalid_operator_operand_pair"
title = "유효하지 않은 연산자/피연산자 쌍"
summary = "연산자가 이를 함께 지원하지 않는 피연산자에 적용되었습니다."
default_message = "제공된 피연산자 타입에 연산자를 적용할 수 없습니다."
recovery = "호환되는 피연산자 타입을 사용하거나 현재 타입에 대해 정의된 연산자를 선택하십시오."
tags = ["semantic", "operator", "types"]

[messages.N2003]
severity = "error"
phase = "semantic"
slug = "invalid_return_type"
title = "유효하지 않은 반환 타입"
summary = "return 문이 선언된 반환 타입과 호환되지 않는 값을 생성합니다."
default_message = "반환된 값이 선언된 반환 타입과 일치하지 않습니다."
recovery = "호환되는 값을 반환하거나 선언된 반환 타입을 변경하십시오."
tags = ["semantic", "return", "types"]

[messages.N2101]
severity = "error"
phase = "semantic"
slug = "ambiguous_type_inference"
title = "모호한 타입 추론"
summary = "컴파일러가 사용 가능한 컨텍스트에서 고유한 타입을 추론하지 못했습니다."
default_message = "타입을 명확하게 추론할 수 없습니다."
recovery = "명시적 타입 어노테이션을 추가하거나 더 많은 컨텍스트를 제공하도록 표현식을 다시 작성하십시오."
tags = ["semantic", "inference", "ambiguity"]

[messages.N2102]
severity = "error"
phase = "semantic"
slug = "conflicting_branch_inference"
title = "충돌하는 분기 추론"
summary = "제어 흐름의 서로 다른 분기가 동일한 값에 대해 호환되지 않는 추론된 타입을 설정합니다."
default_message = "타입 추론이 제어 흐름 분기 간에 충돌합니다."
recovery = "공통의 호환 타입을 사용하거나 분기마다 별도의 바인딩을 도입하십시오."
tags = ["semantic", "inference", "control-flow"]


[messages.N2201]
severity = "error"
phase = "semantic"
slug = "unknown_identifier"
title = "알 수 없는 식별자"
summary = "참조된 심볼이 현재 스코프에서 보이지 않습니다."
default_message = "참조된 식별자가 현재 스코프에 정의되어 있지 않습니다: {name}."
parameters = ["name"]
recovery = "식별자를 선언하거나, 필요한 모듈을 가져오거나, 철자를 수정하십시오."
tags = ["semantic", "scope", "identifier"]
[messages.N2202]
severity = "error"
phase = "semantic"
slug = "duplicate_symbol"
title = "중복된 심볼"
summary = "동일한 유효 스코프 내의 두 선언이 서로 충돌합니다."
default_message = "동일한 이름의 심볼이 이 스코프에 이미 정의되어 있습니다."
recovery = "선언 중 하나의 이름을 바꾸거나 다른 스코프로 이동하십시오."
tags = ["semantic", "scope", "duplicate"]

[messages.N2203]
severity = "error"
phase = "semantic"
slug = "unknown_named_argument"
title = "알 수 없는 이름 지정 인수"
summary = "호출이 선택된 호출 가능 객체의 매개변수 이름과 일치하지 않는 이름 지정 인수를 사용합니다."
default_message = "이름 지정 인수가 선언된 매개변수와 일치하지 않습니다."
recovery = "유효한 매개변수 이름을 사용하거나 레이블을 제거하십시오."
tags = ["semantic", "call", "named-arguments"]

[messages.N2301]
severity = "error"
phase = "semantic"
slug = "generic_arity_mismatch"
title = "제네릭 아리티 불일치"
summary = "제네릭 타입 또는 호출 가능 객체가 잘못된 수의 타입 인수를 받았습니다."
default_message = "제네릭 인수의 수가 선언과 일치하지 않습니다."
recovery = "필요한 제네릭 인수의 정확한 수를 제공하십시오."
tags = ["semantic", "generics", "arity"]

[messages.N2302]
severity = "error"
phase = "semantic"
slug = "unsatisfied_generic_constraint"
title = "충족되지 않은 제네릭 제약 조건"
summary = "제네릭 인수가 해당 타입 매개변수에 선언된 제약 조건을 충족하지 않습니다."
default_message = "제네릭 인수가 필요한 제약 조건을 충족하지 않습니다."
recovery = "제약 조건을 충족하는 타입을 사용하거나 제네릭 선언을 완화하십시오."
tags = ["semantic", "generics", "constraint"]

[messages.N2401]
severity = "error"
phase = "semantic"
slug = "no_viable_overload"
title = "실행 가능한 오버로드 없음"
summary = "오버로드 세트의 호출 가능 객체 중 제공된 인수 목록을 수락하는 것이 없습니다."
default_message = "제공된 인수와 일치하는 오버로드가 없습니다."
recovery = "인수 타입, 수 또는 레이블을 변경하거나 일치하는 오버로드를 추가하십시오."
tags = ["semantic", "overload", "call"]

[messages.N2402]
severity = "error"
phase = "semantic"
slug = "ambiguous_overload"
title = "모호한 오버로드"
summary = "둘 이상의 호출 가능 객체가 제공된 인수와 동일하게 잘 일치합니다."
default_message = "호출이 여러 오버로드 사이에서 모호합니다."
recovery = "명시적 타입, 캐스트 또는 더 구체적인 인수 목록으로 호출의 모호성을 해결하십시오."
tags = ["semantic", "overload", "ambiguity"]

[messages.W2001]
severity = "warning"
phase = "semantic"
slug = "unreachable_code"
title = "도달할 수 없는 코드"
summary = "제어 흐름이 이미 종료되었거나 우회했기 때문에 문을 실행할 수 없습니다."
default_message = "코드에 도달할 수 없습니다."
recovery = "데드 코드를 제거하거나 문에 도달할 수 있도록 제어 흐름을 다시 작성하십시오."
tags = ["warning", "semantic", "control-flow"]

[messages.W2002]
severity = "warning"
phase = "semantic"
slug = "redundant_cast"
title = "불필요한 캐스트"
summary = "캐스트 또는 변환 단계가 실제 타입을 변경하지 않습니다."
default_message = "캐스트가 불필요합니다."
recovery = "프로젝트 관례상 명확성을 위해 유지하는 경우가 아니라면 불필요한 캐스트를 제거하십시오."
tags = ["warning", "semantic", "cast"]


[messages.N2403]
severity = "error"
phase = "semantic"
slug = "unknown_callable_target"
title = "알 수 없는 호출 대상"
summary = "호출이 호출 가능으로 해석할 수 없는 심볼 또는 멤버 체인을 대상으로 합니다."
default_message = "알 수 없는 호출 대상: {target}."
parameters = ["target"]
recovery = "대상이 존재하고 범위 내에서 보이며 호출 가능한 심볼인지 확인하십시오."
tags = ["semantic", "call", "resolution"]

[messages.N2204]
severity = "error"
phase = "semantic"
slug = "use_before_initialization"
title = "초기화 전 사용"
summary = "변수가 초기화되기 전에 읽혔습니다."
default_message = "변수가 초기화되기 전에 사용됩니다: {name}."
parameters = ["name"]
recovery = "변수를 읽기 전에 모든 제어 흐름 경로에서 초기화하십시오."
tags = ["semantic", "flow", "initialization"]
