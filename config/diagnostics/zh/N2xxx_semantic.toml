[catalog]
locale = "zh"
bucket = "N2xxx_semantic"
display_name = "语义诊断"
inherits_contract = "N2xxx_semantic"

[contracts]
allowed_exact_codes = ["NPP2001"]
allowed_n_range = "2000-2499"
allowed_w_range = "2000-2099"
future_addition_rule = "Only N2000-N2499, W2000-W2099, and the exact legacy semantic code listed above may appear in this file."

[messages.NPP2001]
severity = "error"
phase = "semantic"
slug = "legacy_semantic_error"
title = "旧版语义错误"
summary = "在连接更精细的语义代码之前，语义失败的兼容性存储桶。"
default_message = "程序在语法上有效，但在语义上无效。"
recovery = "检查报告位置附近的类型、名称、泛型、重载和值流。"
tags = ["legacy", "semantic", "fallback"]

[messages.N2001]
severity = "error"
phase = "semantic"
slug = "type_mismatch"
title = "类型不匹配"
summary = "在需要另一种类型的地方使用了一种类型的值。"
default_message = "所需类型与提供的值之间类型不匹配。"
recovery = "更改源表达式，添加显式转换，或调整目标类型。"
tags = ["semantic", "types", "assignment"]

[messages.N2002]
severity = "error"
phase = "semantic"
slug = "invalid_operator_operand_pair"
title = "无效的运算符操作数对"
summary = "运算符应用于不支持它的操作数。"
default_message = "无法将运算符应用于提供的操作数类型。"
recovery = "使用兼容的操作数类型或选择为当前类型定义的运算符。"
tags = ["semantic", "operator", "types"]

[messages.N2003]
severity = "error"
phase = "semantic"
slug = "invalid_return_type"
title = "返回类型无效"
summary = "返回语句产生的值与声明的返回类型不兼容。"
default_message = "返回的值与声明的返回类型不匹配。"
recovery = "返回兼容的值或更改声明的返回类型。"
tags = ["semantic", "return", "types"]

[messages.N2101]
severity = "error"
phase = "semantic"
slug = "ambiguous_type_inference"
title = "类型推断不明确"
summary = "编译器无法从可用上下文中推断出唯一类型。"
default_message = "无法明确推断类型。"
recovery = "添加显式类型注解或重写表达式以提供更多上下文。"
tags = ["semantic", "inference", "ambiguity"]

[messages.N2102]
severity = "error"
phase = "semantic"
slug = "conflicting_branch_inference"
title = "分支推断冲突"
summary = "不同的控制流分支为同一个值建立了不兼容的推断类型。"
default_message = "类型推断在控制流分支之间冲突。"
recovery = "使用共享的兼容类型或为每个分支引入单独的绑定。"
tags = ["semantic", "inference", "control-flow"]


[messages.N2201]
severity = "error"
phase = "semantic"
slug = "unknown_identifier"
title = "未知标识符"
summary = "引用的符号在当前作用域中不可见。"
default_message = "引用的标识符在当前作用域中未定义: {name}。"
parameters = ["name"]
recovery = "请声明该标识符、导入所需模块，或修正拼写错误。"
tags = ["semantic", "scope", "identifier"]
[messages.N2202]
severity = "error"
phase = "semantic"
slug = "duplicate_symbol"
title = "重复符号"
summary = "同一有效作用域内的两个声明相互冲突。"
default_message = "具有相同名称的符号已在此作用域内定义。"
recovery = "重命名其中一个声明或将其移至不同的作用域。"
tags = ["semantic", "scope", "duplicate"]

[messages.N2203]
severity = "error"
phase = "semantic"
slug = "unknown_named_argument"
title = "未知的命名参数"
summary = "调用使用的命名参数与所选可调用对象的任何参数名称不匹配。"
default_message = "命名参数与任何声明的参数都不匹配。"
recovery = "使用有效的参数名称或移除标签。"
tags = ["semantic", "call", "named-arguments"]

[messages.N2301]
severity = "error"
phase = "semantic"
slug = "generic_arity_mismatch"
title = "泛型元数不匹配"
summary = "泛型类型或可调用对象接收了错误的类型参数数量。"
default_message = "泛型参数计数与声明不匹配。"
recovery = "提供所需的确切泛型参数数量。"
tags = ["semantic", "generics", "arity"]

[messages.N2302]
severity = "error"
phase = "semantic"
slug = "unsatisfied_generic_constraint"
title = "未满足泛型约束"
summary = "泛型参数不满足为其类型参数声明的约束。"
default_message = "泛型参数不满足所需的约束。"
recovery = "使用满足约束的类型或放宽泛型声明。"
tags = ["semantic", "generics", "constraint"]

[messages.N2401]
severity = "error"
phase = "semantic"
slug = "no_viable_overload"
title = "无可用重载"
summary = "重载集中的任何可调用对象都不接受提供的参数列表。"
default_message = "没有重载匹配提供的参数。"
recovery = "更改参数类型、计数或标签，或添加匹配的重载。"
tags = ["semantic", "overload", "call"]

[messages.N2402]
severity = "error"
phase = "semantic"
slug = "ambiguous_overload"
title = "重载不明确"
summary = "多个可调用对象与提供的参数匹配程度相同。"
default_message = "调用在多个重载之间不明确。"
recovery = "通过显式类型、强制转换或更具体的参数列表来消除调用歧义。"
tags = ["semantic", "overload", "ambiguity"]

[messages.W2001]
severity = "warning"
phase = "semantic"
slug = "unreachable_code"
title = "无法访问的代码"
summary = "由于控制流已终止或绕过，无法执行该语句。"
default_message = "代码无法访问。"
recovery = "移除死代码或重写控制流以便可以访问该语句。"
tags = ["warning", "semantic", "control-flow"]

[messages.W2002]
severity = "warning"
phase = "semantic"
slug = "redundant_cast"
title = "冗余转换"
summary = "转换或转换步骤不改变有效类型。"
default_message = "转换是冗余的。"
recovery = "除非按照项目惯例为了清晰起见而保留，否则请移除不必要的转换。"
tags = ["warning", "semantic", "cast"]


[messages.N2403]
severity = "error"
phase = "semantic"
slug = "unknown_callable_target"
title = "未知可调用目标"
summary = "调用指向了无法解析为可调用对象的符号或成员链。"
default_message = "未知可调用目标：{target}。"
parameters = ["target"]
recovery = "检查该目标是否存在、在当前作用域可见，并且确实表示可调用符号。"
tags = ["semantic", "call", "resolution"]

[messages.N2204]
severity = "error"
phase = "semantic"
slug = "use_before_initialization"
title = "初始化前使用"
summary = "变量在完成初始化之前就被读取。"
default_message = "变量在初始化之前被使用：{name}。"
parameters = ["name"]
recovery = "在读取变量之前，确保每条控制流路径上都已完成初始化。"
tags = ["semantic", "flow", "initialization"]
