[catalog]
locale = "fr"
bucket = "N2xxx_semantic"
display_name = "Diagnostics sémantiques"
inherits_contract = "N2xxx_semantic"

[contracts]
allowed_exact_codes = ["NPP2001"]
allowed_n_range = "2000-2499"
allowed_w_range = "2000-2099"
future_addition_rule = "Seuls les codes N2000-N2499, W2000-W2099 et le code sémantique hérité exact listé ci-dessus peuvent apparaître dans ce fichier."

[messages.NPP2001]
severity = "error"
phase = "semantic"
slug = "legacy_semantic_error"
title = "Erreur sémantique (héritée)"
summary = "Bac de compatibilité pour les échecs sémantiques jusqu'à ce que des codes sémantiques plus précis soient connectés."
default_message = "Le programme est syntaxiquement valide mais sémantiquement invalide."
recovery = "Inspectez les types, les noms, les génériques, les surcharges et le flux de valeurs près de l'emplacement rapporté."
tags = ["legacy", "semantic", "fallback"]

[messages.N2001]
severity = "error"
phase = "semantic"
slug = "type_mismatch"
title = "Incompatibilité de type"
summary = "Une valeur d'un type a été utilisée là où un autre type était requis."
default_message = "Incompatibilité de type entre le type requis et la valeur fournie."
recovery = "Modifiez l'expression source, ajoutez une conversion explicite ou ajustez le type de destination."
tags = ["semantic", "types", "assignment"]

[messages.N2002]
severity = "error"
phase = "semantic"
slug = "invalid_operator_operand_pair"
title = "Paire opérateur/opérande invalide"
summary = "Un opérateur a été appliqué à des opérandes qui ne le supportent pas ensemble."
default_message = "L'opérateur ne peut pas être appliqué aux types d'opérandes fournis."
recovery = "Utilisez des types d'opérandes compatibles ou choisissez un opérateur défini pour les types actuels."
tags = ["semantic", "operator", "types"]

[messages.N2003]
severity = "error"
phase = "semantic"
slug = "invalid_return_type"
title = "Type de retour invalide"
summary = "Une instruction de retour produit une valeur incompatible avec le type de retour déclaré."
default_message = "La valeur retournée ne correspond pas au type de retour déclaré."
recovery = "Retournez une valeur compatible ou modifiez le type de retour déclaré."
tags = ["semantic", "return", "types"]

[messages.N2101]
severity = "error"
phase = "semantic"
slug = "ambiguous_type_inference"
title = "Inférence de type ambiguë"
summary = "Le compilateur n'a pas pu inférer un type unique à partir du contexte disponible."
default_message = "Le type n'a pas pu être inféré de manière non ambiguë."
recovery = "Ajoutez une annotation de type explicite ou réécrivez l'expression pour fournir plus de contexte."
tags = ["semantic", "inference", "ambiguity"]

[messages.N2102]
severity = "error"
phase = "semantic"
slug = "conflicting_branch_inference"
title = "Inférence de branche conflictuelle"
summary = "Différentes branches de flux de contrôle établissent des types inférés incompatibles pour la même valeur."
default_message = "L'inférence de type entre en conflit à travers les branches du flux de contrôle."
recovery = "Utilisez un type compatible partagé ou introduisez des liaisons distinctes par branche."
tags = ["semantic", "inference", "control-flow"]


[messages.N2201]
severity = "error"
phase = "semantic"
slug = "unknown_identifier"
title = "Identifiant inconnu"
summary = "Un symbole reference n'est pas visible dans la portee actuelle."
default_message = "L'identifiant reference n'est pas defini dans la portee actuelle : {name}."
parameters = ["name"]
recovery = "Declarez l'identifiant, importez le module requis ou corrigez l'orthographe."
tags = ["semantic", "scope", "identifier"]
[messages.N2202]
severity = "error"
phase = "semantic"
slug = "duplicate_symbol"
title = "Symbole en double"
summary = "Deux déclarations dans la même portée effective entrent en conflit l'une avec l'autre."
default_message = "Un symbole portant le même nom est déjà défini dans cette portée."
recovery = "Renommez une déclaration ou déplacez-la dans une autre portée."
tags = ["semantic", "scope", "duplicate"]

[messages.N2203]
severity = "error"
phase = "semantic"
slug = "unknown_named_argument"
title = "Argument nommé inconnu"
summary = "Un appel utilise un argument nommé qui ne correspond à aucun nom de paramètre sur l'appelable sélectionné."
default_message = "L'argument nommé ne correspond à aucun paramètre déclaré."
recovery = "Utilisez un nom de paramètre valide ou supprimez l'étiquette."
tags = ["semantic", "call", "named-arguments"]

[messages.N2301]
severity = "error"
phase = "semantic"
slug = "generic_arity_mismatch"
title = "Incompatibilité d'arité générique"
summary = "Un type générique ou un appelable a reçu un nombre incorrect d'arguments de type."
default_message = "Le nombre d'arguments génériques ne correspond pas à la déclaration."
recovery = "Fournissez le nombre exact d'arguments génériques requis."
tags = ["semantic", "generics", "arity"]

[messages.N2302]
severity = "error"
phase = "semantic"
slug = "unsatisfied_generic_constraint"
title = "Contrainte générique non satisfaite"
summary = "Un argument générique ne satisfait pas la contrainte déclarée pour son paramètre de type."
default_message = "L'argument générique ne satisfait pas la contrainte requise."
recovery = "Utilisez un type qui satisfait la contrainte ou assouplissez la déclaration générique."
tags = ["semantic", "generics", "constraint"]

[messages.N2401]
severity = "error"
phase = "semantic"
slug = "no_viable_overload"
title = "Aucune surcharge viable"
summary = "Aucun appelable dans l'ensemble de surcharges n'accepte la liste d'arguments fournie."
default_message = "Aucune surcharge ne correspond aux arguments fournis."
recovery = "Modifiez les types d'arguments, le nombre ou les étiquettes, ou ajoutez une surcharge correspondante."
tags = ["semantic", "overload", "call"]

[messages.N2402]
severity = "error"
phase = "semantic"
slug = "ambiguous_overload"
title = "Surcharge ambiguë"
summary = "Plus d'un appelable correspond également bien aux arguments fournis."
default_message = "L'appel est ambigu entre plusieurs surcharges."
recovery = "Levez l'ambiguïté de l'appel avec des types explicites, des transtypages ou une liste d'arguments plus spécifique."
tags = ["semantic", "overload", "ambiguity"]

[messages.W2001]
severity = "warning"
phase = "semantic"
slug = "unreachable_code"
title = "Code inatteignable"
summary = "Une instruction ne peut pas être exécutée car le flux de contrôle s'est déjà terminé ou l'a contournée."
default_message = "Le code est inatteignable."
recovery = "Supprimez le code mort ou réécrivez le flux de contrôle pour que l'instruction soit atteignable."
tags = ["warning", "semantic", "control-flow"]

[messages.W2002]
severity = "warning"
phase = "semantic"
slug = "redundant_cast"
title = "Transtypage redondant"
summary = "Une étape de transtypage ou de conversion ne modifie pas le type effectif."
default_message = "Le transtypage est redondant."
recovery = "Supprimez le transtypage inutile, sauf s'il est conservé pour la clarté par convention de projet."
tags = ["warning", "semantic", "cast"]


[messages.N2403]
severity = "error"
phase = "semantic"
slug = "unknown_callable_target"
title = "Cible appelable inconnue"
summary = "Un appel vise un symbole ou une chaine de membres qui ne peut pas etre resolu comme appelable."
default_message = "Cible appelable inconnue : {target}."
parameters = ["target"]
recovery = "Verifiez que la cible existe, est visible dans la portee et designe bien un symbole appelable."
tags = ["semantic", "call", "resolution"]

[messages.N2204]
severity = "error"
phase = "semantic"
slug = "use_before_initialization"
title = "Utilisation avant initialisation"
summary = "Une variable est lue avant d'avoir ete initialisee."
default_message = "La variable est utilisee avant d'etre initialisee : {name}."
parameters = ["name"]
recovery = "Initialisez la variable sur chaque chemin de controle avant de la lire."
tags = ["semantic", "flow", "initialization"]
