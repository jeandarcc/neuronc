name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Build & Test (Windows / MinGW)
    runs-on: windows-latest

    env:
      LLVM_DIR: C:\msys64\mingw64\lib\cmake\llvm
      NEURON_TOOLCHAIN_BIN: C:\msys64\mingw64\bin

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 + MinGW toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-libffi
            mingw-w64-x86_64-cmake

      - name: Build
        shell: cmd
        run: scripts\build.bat

      - name: Run tests
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build_tests.ps1 `
            -BuildDir "$env:LOCALAPPDATA\NeuronPP\workspaces\NPP\build-mingw" `
            -Filter "*" `
            -LlvmDir "$env:LLVM_DIR"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            scripts/build_error.txt
            scripts/build_out.txt
          if-no-files-found: ignore
