name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every night
  workflow_dispatch:       # Allow manual trigger

jobs:
  full-test:
    name: Full Test Suite + Benchmarks
    runs-on: windows-latest

    env:
      LLVM_DIR: C:\msys64\mingw64\lib\cmake\llvm
      NEURON_TOOLCHAIN_BIN: C:\msys64\mingw64\bin

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 + MinGW toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-libffi
            mingw-w64-x86_64-cmake

      - name: Build
        shell: cmd
        run: scripts\build.bat

      - name: Run full test suite
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build_tests.ps1 `
            -BuildDir "$env:LOCALAPPDATA\NeuronPP\workspaces\NPP\build-mingw" `
            -Filter "*" `
            -LlvmDir "$env:LLVM_DIR"

      - name: Run benchmarks
        shell: powershell
        run: |
          if (Test-Path 'benchmarks\perf_regression_gate.ps1') {
            powershell -NoProfile -ExecutionPolicy Bypass `
              -File benchmarks\perf_regression_gate.ps1
          }

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-results
          path: benchmarks/results/
          if-no-files-found: ignore
